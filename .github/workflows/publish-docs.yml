name: Publish Owner's Manual to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/owners-manual/**'
      - '.github/workflows/publish-docs.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Convert Markdown to HTML
        run: |
          mkdir -p _site
          pandoc docs/owners-manual/owners-manual.md \
            -f markdown \
            -t html \
            --standalone \
            --metadata title="DawnDeck Owner's Manual" \
            --css style.css \
            -o _site/index.html

      - name: Copy CSS file
        run: |
          cp docs/owners-manual/style.css _site/style.css

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
